{% load static %} {% comment %} Cargar los archivos estaticos {% endcomment %}

<!-- Logo -->
<a href="{% url 'namespaceraices:main' %}"><!-- Otra opción es: "/" -->
    <img class="logo-header" src="{% static 'img/logo.svg' %}" alt="logo_bienesRaices" />
</a>

<!--------- Div extra --------->
<div class="extra-mobil">
    <!-- btn dark -->
    <div class="derecha-btndark">
        <div class="separa-logo">
            <p>{{ request.user.username }}</p>
            <i class="fa-solid fa-moon dark-mode-btn" id="icon-moon"></i>
        </div>
    </div>

    <!-- burger btn -->
    <div class="final-btn dropdown">
            <div class="mobile-menu"> 
                <img src="{% static 'img/barras.svg' %}" />
            </div>
            <div class="dropdown">
                <div id="myDropdown" class="dropdown-content">
                    <nav class="navegacion-header">
                        <a href="{% url 'namespaceraices:nosotros' %}">Acerca de nosotros</a>
                        <a href="{% url 'namespaceraices:anuncios' %}">Anuncios</a>
                        <a href="{% url 'namespaceblog:blog_list' %}">Blog</a>
                        <a href="{% url 'namespaceraices:contacto' %}">Contacto</a>
                        {% if request.user.is_authenticated %}
                            <a href="{% url 'logout' %}"><i class="fa-solid fa-arrow-right-from-bracket"></i></a>
                        {% else %}
                            <a href="{% url 'login' %}">Inicia sesión</a>
                        {% endif %}
                    </nav>
                </div>
            </div>
    </div>
</div>
